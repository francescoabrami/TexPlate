name: Build LaTeX document and Release (Docker-based)

# Permissions
permissions:
  contents: write
  pull-requests: read

# Trigger
on:
  push:
    paths:
      - main.tex

env:
  PDF_NAME: "MAIN.pdf"

jobs:

  build_latex:

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/xu-cheng/texlive-historic-alpine:2023

    steps:

      # 1. Checkout repository
      - name: Set up Git repository
        uses: actions/checkout@v6

      # 2. Run LaTeX using Docker
      - name: Compile LaTeX document
        run: |
          latexmk -pdf -file-line-error -halt-on-error -interaction=nonstopmode main.tex

      - name: Upload PDF file
        uses: actions/upload-artifact@v5
        with:
          name: PDF
          path: main.pdf

      # 3. Extract version and rename output PDF 
      - name: Extract version and rename PDF
        id: get_version
        run: |
          VERSION=$(grep -oP '\\def\\version\{\K[^\}]+' main.tex || echo "v0.0.0")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

          if [ -f "main.pdf" ]; then
            mv main.pdf "$PDF_NAME"
          else
            echo "${{ env.PDF_NAME }} not found!"
            exit 1
          fi
          
      # 4. Create Release and Upload PDF
      - name: Create Release and Upload PDF
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PDF_NAME }}
          tag_name: ${{ steps.get_version.outputs.version }}
          body: |
            Release for version ${{ steps.get_version.outputs.version }} of ${{ env.PDF_NAME }}.
            Compiled with TeX Live ${{ env.TEXLIVE_VERSION }}.